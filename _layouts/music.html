<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | poettery</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.css" />
  <link rel="stylesheet" href="/poettery/tabs.css">
</head>
<body>
<div class="nav">
  <a href="/poettery/">← Назад</a>
</div>

<div class="poem">
  {{ content }}
</div>

<div class="player-controls">
  <button id="playPauseBtn" disabled>▶ Play</button>
  <button id="stopBtn" disabled>⏹ Stop</button>
</div>

<div id="track-wrapper">
  <div id="alphaTabContainer" data-file="{{ page.file }}"></div>
</div>

<script type="module" src="/poettery/tabs.js"></script>
</body>
</html>
