<pre class="poem">
Бумажным аистом он стал
и с тех угрюмых пор
над белой башней он кричит
ночами Мутабор
Устало дремлет муэдзин
Шахерезада врёт
и снова тысяча один и ноль
Двоичный счет
</pre>
